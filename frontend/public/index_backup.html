<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060A0F">
<title>NeuralHire — Smart Resume-to-Job Matching</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060A0F;
    --surface: #0D1520;
    --surface2: #111D2E;
    --border: #1A2D45;
    --accent: #00D4FF;
    --accent2: #7C3AED;
    --accent3: #10B981;
    --warn: #F59E0B;
    --text: #E8F4FF;
    --muted: #5A7A9A;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Instrument Serif', serif;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:var(--font-display);
    overflow-x:hidden; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ── NAV ─────────────────────────────────────────────────────────── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(6,10,15,0.95);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .logo {
    display:flex; align-items:center; gap:8px;
    font-size:1.2rem; font-weight:800; letter-spacing:-0.03em;
    text-decoration:none; color:var(--text);
  }
  .logo-icon {
    width:32px; height:32px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:9px; display:flex; align-items:center;
    justify-content:center; font-size:14px; flex-shrink:0;
  }
  .logo span { color:var(--accent); }

  /* Desktop nav links */
  .nav-links { display:flex; gap:28px; list-style:none; }
  .nav-links a {
    color:var(--muted); text-decoration:none;
    font-size:0.8rem; font-weight:500;
    letter-spacing:0.06em; text-transform:uppercase;
    transition:color 0.2s;
  }
  .nav-links a:hover { color:var(--text); }

  .nav-cta {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; border:none; padding:9px 20px;
    border-radius:8px; font-family:var(--font-display);
    font-size:0.82rem; font-weight:700; cursor:pointer;
    transition:opacity 0.2s; white-space:nowrap;
    text-decoration:none;
  }
  .nav-cta:hover { opacity:0.85; }

  /* Hamburger */
  .hamburger {
    display:none; flex-direction:column; gap:5px;
    cursor:pointer; padding:6px; background:none; border:none;
    z-index:210;
  }
  .hamburger span {
    display:block; width:22px; height:2px;
    background:var(--text); border-radius:2px;
    transition:transform 0.3s, opacity 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity:0; }
  .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

  /* Mobile drawer */
  .mobile-drawer {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(6,10,15,0.98); z-index:190;
    flex-direction:column; align-items:center; justify-content:center;
    gap:36px; opacity:0; transition:opacity 0.3s;
  }
  .mobile-drawer.open { opacity:1; }
  .mobile-drawer a {
    color:var(--text); text-decoration:none;
    font-size:1.6rem; font-weight:800; letter-spacing:-0.03em;
    transition:color 0.2s;
  }
  .mobile-drawer a:hover { color:var(--accent); }
  .mobile-drawer .m-cta {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    padding:14px 36px; border-radius:12px; font-size:1rem;
    color:#fff;
  }

  /* ── HERO ─────────────────────────────────────────────────────────── */
  .hero {
    min-height:100svh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:100px 24px 60px;
    position:relative; overflow:hidden;
  }
  .hero-grid {
    position:absolute; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size:50px 50px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
  }
  .hero-glow {
    position:absolute; top:20%; left:50%; transform:translateX(-50%);
    width:min(700px,100vw); height:400px; z-index:0;
    background:radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:7px;
    background:rgba(0,212,255,0.08);
    border:1px solid rgba(0,212,255,0.2);
    border-radius:100px; padding:6px 14px;
    font-size:0.72rem; font-family:var(--font-mono);
    color:var(--accent); margin-bottom:28px;
    letter-spacing:0.08em; text-transform:uppercase;
    position:relative; z-index:1;
    animation:fadeUp 0.8s ease both;
  }
  .badge-dot {
    width:6px; height:6px; background:var(--accent);
    border-radius:50%; animation:pulse 2s infinite; flex-shrink:0;
  }
  .hero h1 {
    font-size:clamp(2.4rem,8vw,5.5rem);
    font-weight:800; line-height:1.05; letter-spacing:-0.04em;
    position:relative; z-index:1; max-width:860px;
    animation:fadeUp 0.8s ease 0.1s both;
  }
  .hero h1 em {
    font-style:italic; font-family:var(--font-serif);
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .hero-sub {
    font-size:clamp(0.9rem,2.5vw,1.05rem);
    color:var(--muted); max-width:560px;
    line-height:1.7; margin-top:20px; font-weight:400;
    position:relative; z-index:1;
    animation:fadeUp 0.8s ease 0.2s both;
  }
  .hero-actions {
    display:flex; gap:12px; margin-top:36px;
    position:relative; z-index:1;
    animation:fadeUp 0.8s ease 0.3s both;
    flex-wrap:wrap; justify-content:center;
  }
  .btn-primary {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; border:none; padding:14px 28px;
    border-radius:12px; font-family:var(--font-display);
    font-size:0.95rem; font-weight:700; cursor:pointer;
    transition:transform 0.2s, box-shadow 0.2s;
    box-shadow:0 0 40px rgba(0,212,255,0.2);
    min-height:48px; /* touch target */
  }
  .btn-primary:active { transform:scale(0.97); }
  .btn-ghost {
    background:transparent; color:var(--text);
    border:1px solid var(--border);
    padding:14px 28px; border-radius:12px;
    font-family:var(--font-display); font-size:0.95rem;
    font-weight:600; cursor:pointer;
    transition:border-color 0.2s, background 0.2s;
    min-height:48px;
  }
  .btn-ghost:active { background:rgba(0,212,255,0.05); }

  /* ── STATS ───────────────────────────────────────────────────────── */
  .stats-bar {
    display:grid; grid-template-columns:repeat(2,1fr);
    gap:1px; background:var(--border);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
  }
  .stat {
    text-align:center; padding:28px 16px;
    background:var(--surface);
  }
  .stat-num {
    font-size:2rem; font-weight:800; letter-spacing:-0.04em;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .stat-label {
    font-size:0.72rem; color:var(--muted);
    font-family:var(--font-mono); letter-spacing:0.06em; margin-top:4px;
  }

  /* ── SECTIONS ────────────────────────────────────────────────────── */
  .section { padding:60px 20px; max-width:1200px; margin:0 auto; }
  .section-tag {
    font-family:var(--font-mono); font-size:0.72rem;
    color:var(--accent); text-transform:uppercase;
    letter-spacing:0.12em; margin-bottom:12px;
  }
  .section-tag::before { content:'// '; opacity:0.5; }
  .section-title {
    font-size:clamp(1.6rem,4vw,2.8rem);
    font-weight:800; letter-spacing:-0.04em;
    line-height:1.15; margin-bottom:12px;
  }
  .section-sub {
    color:var(--muted); font-size:0.9rem;
    line-height:1.7; max-width:580px; margin-bottom:40px;
  }

  /* ── PROBLEM CARDS ───────────────────────────────────────────────── */
  .problem-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:16px; margin-top:40px;
  }
  .problem-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px;
    position:relative; overflow:hidden;
    transition:border-color 0.3s, transform 0.3s;
  }
  .problem-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,var(--accent),transparent);
  }
  .problem-card:hover { border-color:rgba(0,212,255,0.3); }
  .problem-icon { font-size:2rem; margin-bottom:14px; }
  .problem-card h3 { font-size:1rem; font-weight:700; margin-bottom:8px; }
  .problem-card p { color:var(--muted); line-height:1.6; font-size:0.84rem; }
  .problem-stat {
    display:inline-flex; align-items:center; margin-top:12px;
    background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2);
    color:var(--warn); border-radius:8px;
    padding:4px 10px; font-size:0.7rem; font-family:var(--font-mono);
  }

  /* ── HOW IT WORKS ────────────────────────────────────────────────── */
  .how-section {
    background:var(--surface);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:60px 0;
  }
  .steps-scroll {
    overflow-x:auto; padding:0 20px 16px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .steps-scroll::-webkit-scrollbar { display:none; }
  .steps-track {
    display:flex; gap:0;
    min-width:max-content;
    padding-top:8px;
  }
  .step {
    width:160px; text-align:center; padding:12px;
  }
  .step-num {
    width:68px; height:68px; margin:0 auto 16px;
    background:var(--surface2); border:2px solid var(--border);
    border-radius:18px; display:flex; align-items:center;
    justify-content:center; font-size:1.5rem;
    position:relative; transition:border-color 0.3s;
  }
  .step:hover .step-num { border-color:var(--accent); }
  .step-idx {
    position:absolute; top:-7px; right:-7px;
    width:20px; height:20px; background:var(--accent2);
    border-radius:50%; font-size:0.6rem; font-family:var(--font-mono);
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .step h4 { font-size:0.84rem; font-weight:700; margin-bottom:5px; }
  .step p { font-size:0.74rem; color:var(--muted); line-height:1.5; }
  .step-arrow { color:var(--accent); opacity:0.5; font-size:1.1rem; padding-top:28px; }

  /* Scroll hint for steps */
  .scroll-hint {
    display:none; text-align:center;
    font-size:0.7rem; color:var(--muted); font-family:var(--font-mono);
    margin-top:8px; letter-spacing:0.08em;
  }

  /* ── DASHBOARD ────────────────────────────────────────────────────── */
  .dashboard-showcase {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,0.5);
    margin-top:40px;
  }
  .dash-topbar {
    background:var(--surface2); border-bottom:1px solid var(--border);
    padding:14px 18px; display:flex; align-items:center; gap:10px;
  }
  .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot-r{background:#FF5F56;} .dot-y{background:#FFBD2E;} .dot-g{background:#27C93F;}
  .dash-title {
    flex:1; text-align:center; font-size:0.72rem;
    font-family:var(--font-mono); color:var(--muted); letter-spacing:0.04em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .dash-body { display:flex; flex-direction:column; }

  /* Sidebar / JD panel */
  .dash-sidebar {
    padding:20px; border-bottom:1px solid var(--border);
    background:rgba(0,0,0,0.15);
  }
  .sidebar-label {
    font-size:0.68rem; font-family:var(--font-mono);
    color:var(--muted); text-transform:uppercase;
    letter-spacing:0.1em; margin-bottom:8px; display:block;
  }
  .jd-textarea {
    width:100%; background:var(--surface);
    border:1px solid var(--border); border-radius:10px;
    padding:14px; color:var(--text);
    font-family:var(--font-mono); font-size:0.76rem;
    line-height:1.6; resize:vertical; outline:none;
    transition:border-color 0.2s; min-height:140px;
    -webkit-appearance:none;
  }
  .jd-textarea:focus { border-color:var(--accent); }

  .analyze-btn {
    width:100%; margin-top:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; border:none; padding:14px;
    border-radius:10px; font-family:var(--font-display);
    font-size:0.9rem; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity 0.2s; min-height:50px;
  }
  .analyze-btn:active { opacity:0.8; }

  /* Filter chips */
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:16px; }
  .chip {
    padding:5px 12px; border-radius:100px;
    font-size:0.7rem; font-family:var(--font-mono);
    border:1px solid var(--border); color:var(--muted);
    background:transparent; cursor:pointer; transition:all 0.2s;
    min-height:32px; /* touch target */
  }
  .chip:hover, .chip.active {
    border-color:var(--accent); color:var(--accent);
    background:rgba(0,212,255,0.08);
  }

  /* Pinecone status */
  .status-box {
    margin-top:16px; padding:14px;
    background:rgba(0,212,255,0.04);
    border:1px solid rgba(0,212,255,0.12);
    border-radius:10px;
  }
  .status-row {
    display:flex; align-items:center; gap:6px;
    font-size:0.76rem; color:var(--muted); margin-bottom:3px;
  }
  .status-dot {
    width:6px; height:6px; background:var(--accent3);
    border-radius:50%; animation:pulse 2s infinite; flex-shrink:0;
  }
  .status-meta { font-size:0.68rem; color:var(--muted); font-family:var(--font-mono); }

  /* Results panel */
  .dash-main { padding:20px; }
  .results-header {
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-bottom:16px; gap:10px; flex-wrap:wrap;
  }
  .results-title { font-size:0.95rem; font-weight:700; }
  .results-meta { font-size:0.7rem; font-family:var(--font-mono); color:var(--muted); margin-top:3px; }

  /* Candidate cards */
  .candidate-card {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:14px; padding:16px; margin-bottom:10px;
    display:grid; grid-template-columns:1fr auto;
    gap:12px; cursor:pointer;
    transition:border-color 0.2s, transform 0.15s;
    position:relative; overflow:hidden;
  }
  .candidate-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    border-radius:3px 0 0 3px;
  }
  .candidate-card.hot::before   { background:var(--accent3); }
  .candidate-card.strong::before{ background:var(--accent); }
  .candidate-card.fair::before  { background:var(--warn); }
  .candidate-card:active { transform:scale(0.99); }

  .cand-name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:3px; }
  .cand-name { font-size:0.92rem; font-weight:700; }
  .match-badge {
    font-size:0.6rem; font-family:var(--font-mono); padding:2px 8px;
    border-radius:100px; letter-spacing:0.04em; white-space:nowrap;
  }
  .badge-hot    { background:rgba(16,185,129,0.12); color:#10B981; border:1px solid rgba(16,185,129,0.25); }
  .badge-strong { background:rgba(0,212,255,0.10);  color:#00D4FF; border:1px solid rgba(0,212,255,0.25); }
  .badge-fair   { background:rgba(245,158,11,0.10); color:#F59E0B; border:1px solid rgba(245,158,11,0.25); }

  .cand-role { font-size:0.76rem; color:var(--muted); margin-bottom:8px; }
  .skill-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
  .skill-tag {
    padding:2px 8px; border-radius:100px;
    font-size:0.65rem; font-family:var(--font-mono);
    background:rgba(0,212,255,0.07);
    border:1px solid rgba(0,212,255,0.18); color:var(--accent);
  }
  .cand-summary { font-size:0.72rem; color:var(--muted); line-height:1.5; font-family:var(--font-mono); }

  /* Score ring */
  .score-ring { text-align:center; min-width:60px; flex-shrink:0; }
  .ring-wrap {
    position:relative; width:60px; height:60px;
    margin:0 auto 4px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring-wrap svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
  .ring-inner { text-align:center; position:relative; z-index:1; }
  .ring-num { font-size:1rem; font-weight:800; line-height:1; }
  .ring-pct { font-size:0.55rem; color:var(--muted); font-family:var(--font-mono); }
  .score-lbl { font-size:0.6rem; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.04em; }

  /* Accuracy chart */
  .accuracy-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:14px; padding:16px; margin-top:16px;
  }
  .acc-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .acc-label { font-size:0.7rem; font-family:var(--font-mono); color:var(--muted); min-width:110px; }
  .acc-bg { flex:1; height:5px; background:var(--surface); border-radius:100px; overflow:hidden; }
  .acc-bar { height:100%; border-radius:100px; transition:width 1.5s cubic-bezier(0.23,1,0.32,1); }
  .acc-val { font-size:0.7rem; font-family:var(--font-mono); min-width:30px; text-align:right; }

  /* ── TECH STACK ──────────────────────────────────────────────────── */
  .tech-grid {
    display:grid; grid-template-columns:1fr;
    gap:16px; margin-top:40px;
  }
  .tech-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px;
    transition:border-color 0.3s;
  }
  .tech-card:hover { border-color:rgba(0,212,255,0.3); }
  .tech-logo {
    width:50px; height:50px; border-radius:13px;
    background:var(--surface2); display:flex;
    align-items:center; justify-content:center;
    font-size:1.6rem; margin-bottom:16px;
  }
  .tech-name { font-size:1rem; font-weight:700; margin-bottom:4px; }
  .tech-badge {
    display:inline-block; padding:2px 9px; margin-bottom:10px;
    background:rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.2);
    color:#A78BFA; border-radius:100px;
    font-size:0.
